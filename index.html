<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>صرافی کریپتو</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {margin:0;font-family:Tahoma,sans-serif;background:#0f2027;color:#fff;}
    header {background:#111;padding:15px;text-align:center;font-size:22px;font-weight:bold;color:#00ffcc;}
    .page {display:none;padding:20px;}
    .active-page {display:block;}
    .nav {display:flex;justify-content:space-around;background:#111;padding:15px 0;position:fixed;bottom:0;width:100%;}
    .nav button {flex:1;margin:0 5px;padding:12px;border:none;border-radius:8px;background:#00ffcc;color:#000;font-size:16px;font-weight:bold;cursor:pointer;}
    .nav button.active {background:#ffcc00;color:#000;}
    .asset-value {font-size:24px;font-weight:bold;color:#ffcc00;margin:10px 0;}
    .crypto-item {display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #444;}
    .modal {display:flex;justify-content:center;align-items:center;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);}
    .modal-content {background:#222;padding:20px;border-radius:10px;width:300px;text-align:center;}
    .modal-content input {width:90%;padding:10px;margin:8px 0;border:none;border-radius:8px;}
    .modal-content button {width:45%;padding:10px;margin:5px;border:none;border-radius:8px;background:#00ffcc;color:#000;font-weight:bold;cursor:pointer;}
  </style>
</head>
<body>
  <header>💰 صرافی کریپتو</header>

  <!-- پاپ‌آپ ثبت‌نام و ورود -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <h2>ثبت‌نام / ورود</h2>
      <input type="email" id="email" placeholder="ایمیل">
      <input type="password" id="password" placeholder="رمز عبور">
      <button onclick="register()">ثبت‌نام</button>
      <button onclick="login()">ورود</button>
    </div>
  </div>

  <!-- داشبورد -->
  <div id="dashboard" style="display:none;">
    <section id="home" class="page active-page">
      <h2>خانه</h2>
      <p>ایمیل: <span id="userEmail"></span></p>
      <div class="asset-value" id="assetValue">0.00 USDT</div>
    </section>

    <section id="wallet" class="page">
      <h2>کیف پول</h2>
      <p>آدرس کیف پول TRC20: <span id="walletAddress">TDE8mMioHzXWff1bKfsVpc32AcnWrufPrB</span></p>
      <canvas id="qrcode"></canvas>
    </section>

    <section id="trade" class="page">
      <h2>ترید BTC/USDT</h2>
      <button onclick="buy()">خرید</button>
      <button onclick="sell()">فروش</button>
      <p>دارایی قابل استفاده: <span id="tradeBalance">0 USDT</span></p>
    </section>

    <section id="prices" class="page">
      <h2>۵ ارز برتر</h2>
      <div id="topPrices"></div>
    </section>

    <!-- نوار ناوبری پایین -->
    <div class="nav">
      <button onclick="showPage('home')" class="active">خانه</button>
      <button onclick="showPage('wallet')">کیف پول</button>
      <button onclick="showPage('trade')">ترید</button>
      <button onclick="showPage('prices')">قیمت‌ها</button>
    </div>
  </div>

  <script>
    const API_URL = "https://crypto-backend-0npp.onrender.com";
    let balance = 0;

    async function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const res = await fetch(`${API_URL}/auth/register`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({email,password})
        });
        const data = await res.json();
        alert(data.message || data.error || "هیچ پاسخی دریافت نشد");
      } catch(err) {
        alert("خطا در ارتباط با سرور");
      }
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({email,password})
        });
        const data = await res.json();
        if(data.token){
          document.getElementById("authModal").style.display="none";
          document.getElementById("dashboard").style.display="block";
          document.getElementById("userEmail").innerText=email;
          balance = data.balance || 0;
          updateBalanceDisplay();
          QRCode.toCanvas(document.getElementById('qrcode'), document.getElementById("walletAddress").innerText);
        } else {
          alert(data.error || "ورود ناموفق");
        }
      } catch(err) {
        alert("خطا در ارتباط با سرور");
      }
    }

    async function buy(){
      const email=document.getElementById("email").value;
      try {
        const res=await fetch(`${API_URL}/trade/buy`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({email,symbol:"BTCUSDT",amount:10})
        });
        const data=await res.json();
        alert(data.message||data.error);
        balance=data.balance||balance;
        updateBalanceDisplay();
      } catch(err){
        alert("خطا در خرید");
      }
    }

    async function sell(){
      const email=document.getElementById("email").value;
      try {
        const res=await fetch(`${API_URL}/trade/sell`,{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({email,symbol:"BTCUSDT",amount:10})
        });
        const data=await res.json();
        alert(data.message||data.error);
        balance=data.balance||balance;
        updateBalanceDisplay();
      } catch(err){
        alert("خطا در فروش");
      }
    }

    async function fetchPrices(){
      try {
        const res=await fetch(`${API_URL}/prices/top`);
        const data=await res.json();
        let html="";
        data.forEach(item=>{
          html+=`<div class="crypto-item"><span>${item.symbol}</span><span>${parseFloat(item.price).toFixed(2)}</span></div>`;
        });
        document.getElementById("topPrices").innerHTML=html;
      } catch(err){
        document.getElementById("topPrices").innerText="خطا در دریافت قیمت‌ها";
      }
    }

    function updateBalanceDisplay(){
      document.getElementById("assetValue").innerText=balance.toFixed(2)+" USDT";
      document.getElementById("tradeBalance").innerText=balance.toFixed(2)+" USDT";
    }

    function showPage(pageId){
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
      document.getElementById(pageId).classList.add('active-page');
      document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
      document.querySelector(`.nav button[onclick="showPage('${pageId}')"]`).classList.add('active');
    }

    setInterval(fetchPrices,10000);
    fetchPrices();
  </script>
</body>
</html>
